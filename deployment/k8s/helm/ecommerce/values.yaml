# ─────────────────────────────────────────────────────────────────────────────
# Global settings
# ─────────────────────────────────────────────────────────────────────────────
global:
  registry: mohsensaf          # Docker Hub username / private registry prefix
  tag: latest
  imagePullPolicy: IfNotPresent

  # Shared JWT secrets — override with --set or a sealed-secrets file
  jwtAccessSecret: "change-me-access-secret"
  jwtRefreshSecret: "change-me-refresh-secret"

  namespace: ecommerce

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
gateway:
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

auth:
  replicas: 2
  port: 4001
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  db:
    name: auth-db
    user: auth
    password: auth
    database: auth_db
    storage: 1Gi

product:
  replicas: 2
  port: 4002
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  db:
    name: product-db
    user: product
    password: product
    database: product_db
    storage: 2Gi

cart:
  replicas: 2
  port: 4003
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  db:
    name: cart-db
    user: cart
    password: cart
    database: cart_db
    storage: 1Gi

inventory:
  replicas: 2
