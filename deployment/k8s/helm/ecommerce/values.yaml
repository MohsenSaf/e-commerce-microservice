order:
  replicas: 2
  port: 4005
  resources:
    requests: { cpu: "150m", memory: "192Mi" }
    limits:   { cpu: "750m", memory: "384Mi" }
  db:
    name: order-db
    user: order
    password: order
    database: order_db
    storage: 2Gi

payment:
  replicas: 2
  port: 4006
  resources:
    requests: { cpu: "150m", memory: "192Mi" }
    limits:   { cpu: "750m", memory: "384Mi" }
  db:
    name: payment-db
    user: payment
    password: payment
    database: payment_db
    storage: 1Gi

shipping:
  replicas: 2
