  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  db:
    name: shipping-db
    user: shipping
    password: shipping
    database: shipping_db
    storage: 1Gi

notification:
  replicas: 2
  port: 4008
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  db:
    name: notification-db
    user: notification
    password: notification
    database: notification_db
    storage: 1Gi

reviews:
  replicas: 2
  port: 4009
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
