version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# E-Commerce Microservices — Docker Swarm Stack
# Deploy:  docker stack deploy -c docker-stack.yml ecommerce
# Remove:  docker stack rm ecommerce
# ─────────────────────────────────────────────────────────────────────────────

x-service-defaults: &service-defaults
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first    # zero-downtime rolling update
  rollback_config:
    parallelism: 1
    delay: 5s

x-db-defaults: &db-defaults
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3

services:

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    image: ${REGISTRY:-mohsensaf}/ecommerce-gateway:${TAG:-latest}
    build:
      context: ./gateway
    ports:
      - target: 3000
        published: 3000
        mode: ingress
    environment:
      PORT: 3000
    networks:
      - ecommerce-net
    deploy:
      <<: *service-defaults
      replicas: 2
      resources:
        limits:   { cpus: "0.50", memory: 256M }
        reservations: { cpus: "0.10", memory: 128M }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Auth ─────────────────────────────────────────────────────────────────────
  microservice-auth:
    image: ${REGISTRY:-mohsensaf}/ecommerce-auth:${TAG:-latest}
    build:
      context: ./microservice-auth
    environment:
      DATABASE_URL: postgresql://auth:auth@auth-db:5432/auth_db
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    networks:
      - ecommerce-net
    depends_on:
      - auth-db
    deploy:
      <<: *service-defaults
      replicas: 2
      resources:
        limits:   { cpus: "0.50", memory: 256M }
        reservations: { cpus: "0.10", memory: 128M }

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB:       auth_db
    volumes:
      - auth-data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    deploy:
      <<: *db-defaults
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:   { cpus: "0.50", memory: 512M }
        reservations: { cpus: "0.10", memory: 256M }

  # ── Product ──────────────────────────────────────────────────────────────────
  microservice-product:
    image: ${REGISTRY:-mohsensaf}/ecommerce-product:${TAG:-latest}
    build:
      context: ./microservice-product
